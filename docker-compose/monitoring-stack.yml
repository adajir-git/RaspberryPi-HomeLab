version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - /mnt/data/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - /mnt/data/monitoring/prom_data:/prometheus
    networks:
      - monitor-net
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "472:472"
    restart: unless-stopped
    volumes:
      - /mnt/data/monitoring/graf_data:/var/lib/grafana
    networks:
      - monitor-net
    ports:
      - "3000:3000"

networks:
  monitor-net:
    external: true
