global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'rpi5-server'
    static_configs:
      - targets: ['172.17.0.1:9100']

  - job_name: 'minecraft'
    static_configs:
      - targets: ['172.17.0.1:8081']

  - job_name: 'minecraft-game'
    static_configs:
      - targets: ['172.17.0.1:9225']
